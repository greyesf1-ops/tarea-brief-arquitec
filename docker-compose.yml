services:
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka_broker
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1

  erp-service:
    image: python:3.9-slim
    container_name: erp_producer
    depends_on:
      - kafka
    command: >
      sh -c "pip install kafka-python && 
             python -c 'from kafka import KafkaProducer; import time;
             p = KafkaProducer(bootstrap_servers=\"kafka:9092\");
             print(\"ERP: Conectado y enviando órdenes...\");
             while True:
                 p.send(\"pedidos\", b\"ORDEN-RETAIL-99\");
                 time.sleep(5)'"

  inventory-service:
    image: python:3.9-slim
    container_name: inventory_consumer
    depends_on:
      - kafka
    command: >
      sh -c "pip install kafka-python && 
             python -c 'from kafka import KafkaConsumer;
             c = KafkaConsumer(\"pedidos\", bootstrap_servers=\"kafka:9092\");
             print(\"Inventario: Esperando mensajes...\");
             for msg in c:
                 print(f\"[DEMO] Recibido del ERP: {msg.value.decode()}\")'"
